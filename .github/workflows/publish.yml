name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v0.1.0, v1.2.3, etc.

# Required for OIDC trusted publishing (no API key stored in secrets)
permissions:
  id-token: write
  contents: read

jobs:
  # ── 1. Run the full quality gate before releasing ─────────────────────────
  test:
    name: Quality gate (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check clipflow/ tests/

      - name: Black
        run: python -m black --check clipflow/ tests/

      - name: Mypy
        run: python -m mypy clipflow/ --ignore-missing-imports

      - name: Pytest
        run: python -m pytest tests/ --tb=short

  # ── 2. Build the distribution ────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify distribution with twine
        run: |
          pip install twine
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── 3. Publish to PyPI via OIDC ──────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: pypi
      url: https://pypi.org/p/clipflow

    permissions:
      id-token: write   # OIDC — no API key or password needed

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password — PyPI OIDC trusted publisher handles auth.
        # Set up at: https://pypi.org/manage/project/clipflow/settings/publishing/
