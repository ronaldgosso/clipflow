name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # -----------------------------------------------------------------------
  # Docker build & test (fast path — ensures containerization works)
  # -----------------------------------------------------------------------
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: builder
          push: false
          load: true
          tags: clipflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests in Docker
        run: |
          docker run --rm clipflow:latest \
            bash -c "
              ruff check clipflow tests &&
              black --check clipflow tests &&
              mypy clipflow &&
              pytest --tb=short -v --cov=clipflow --cov-report=term
            "

  # -----------------------------------------------------------------------
  # Native matrix tests (ensures cross-platform compatibility)
  # -----------------------------------------------------------------------
  quality:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg

      - name: Ruff lint
        run: ruff check clipflow tests

      - name: Black format check
        run: black --check clipflow tests

      - name: Mypy type check
        run: mypy clipflow

      - name: Run tests
        run: pytest --tb=short -v
